<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <title>Document</title
        h1{
            color: blue;
            /* background-color: lightblue; */
        } -->
        <link rel="stylesheet" href="style.css">
    </style>
</head>
<body>
    <h1>Three ways to add CSS to HTML</h1>
    <div>
        <ol>
            <li>
                Inline CSS
                <!-- In Inline CSS, we need to add the style attribute to each HTML element -->
            </li>
            <li>
                Internal CSS
                <!-- In Internal CSS, we need to add the style tag inside the head tag of the HTML document. We can write all the CSS rules inside the style tag. -->
            </li>
            <li>
                External CSS
                <!-- In External CSS, we need to create a separate .css file and link it to the HTML document using the link tag in the head section. -->
            </li>
        </ol>
    </div>
    <div>I am a web developer.</div>
    <p>I love coding and creating web applications.</p>
</body>
</html>
