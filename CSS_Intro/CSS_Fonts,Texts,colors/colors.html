<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        p{
            color: rgb(205, 34, 205);
            background-color: hsl(0, 68%, 29%);
            /* The color property in CSS is used to set the color of text. It can accept various types of values, including named colors (e.g., red, blue, green), hex codes (e.g., #ff0000), RGB values (e.g., rgb(255, 0, 0)), RGBA values (e.g., rgba(255, 0, 0, 1)), HSL values (e.g., hsl(0, 100%, 50%)), and HSLA values (e.g., hsla(0, 100%, 50%, 1)). For example, you can set color: red; to make the text red. */
        }
        h1{
            color: orange;
        }
    </style>
</head>
<body>
    <h1>I am learning about colors</h1>
    <p>This is a paragraph with green text.</p>
    <p>Colors can be specified in various ways in CSS:-
        <ol>
            <li>Color Keywords</li>
            <li>Hex Color Code</li>
            <li>RGB Values</li>
            <li>RGBA Values</li>
            <li>HSL Values</li>
        </ol>
    </p>
</body>
</html>
