<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Color Changer</title>
</head>
<body>
    <!-- Write HTML and CSS code to create a simple webpage with a header, a paragraph, and a button that changes the background color of the page when clicked. -->
    <h1>Welcome to My Webpage</h1>
    <p>This is a simple webpage with a header, a paragraph, and a button that changes the background color of the page when clicked.</p>
    <button onclick="changeBackgroundColor()">Change Background Color</button>
    <script>
        function changeBackgroundColor() {
            document.body.style.backgroundColor = getRandomColor();
        }

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }
    </script> 
</body>
</html>
